---
- name: Création des répertoires Oracle
  ansible.builtin.shell: |
    mkdir -p {{ item }}
    chown -R oracle:oinstall /$(echo {{ item }} | cut -d"/" -f2)
    chmod -R 775 /$(echo {{ item }} | cut -d"/" -f2)
  loop:
    - "{{ oracle_base }}"
    - "{{ oracle_inventory }}"
    - "{{ oracle_home }}"
    - "{{ oracle_sources }}"
    - "{{ oracle_oradata }}"
    - "{{ oracle_fra }}"
  tags: createdir

- name: Vérification de l'espace disque sur {{ oracle_base }}
  ansible.builtin.shell: df -P {{ oracle_base }} | awk 'END { print $4 }'
  register: u01size
  changed_when: false
  failed_when: u01size.stdout | int < u01_free_space_gb * 1024 * 1024
  tags: diskfreespace

- name: Vérification de l'espace disque sur /tmp
  ansible.builtin.shell: df -P /tmp | awk 'END { print $4 }'
  register: tmpsize
  changed_when: false
  failed_when: tmpsize.stdout | int < tmp_free_space_gb * 1024 * 1024
  tags: diskfreespace

- name: Vérifier si une installation Oracle existe déjà
  ansible.builtin.shell: grep "{{ oracle_home }}" "{{ oracle_inventory }}/ContentsXML/inventory.xml" | wc -l
  register: checkdbswinstall
  changed_when: false
  failed_when: checkdbswinstall.stdout != "0"
  tags: checkifexists

- name: Télécharger le fichier checksum
  ansible.builtin.shell: wget --no-check-certificate {{ checksum_url }} -O {{ oracle_sources }}/checksum.txt
  tags: download_sw

- name: Extraire le checksum attendu pour {{ oracle_zip_filename }}
  ansible.builtin.shell: grep "{{ oracle_zip_filename }}" {{ oracle_sources }}/checksum.txt | awk '{print $1}'
  register: expected_checksum
  changed_when: false
  tags: download_sw

- name: Vérifier que le checksum a été trouvé pour {{ oracle_zip_filename }}
  ansible.builtin.fail:
    msg: "Checksum introuvable pour '{{ oracle_zip_filename }}' dans checksum.txt."
  when: expected_checksum.stdout | length == 0
  tags: download_sw

- name: Extraire le checksum attendu pour {{ opatch_file }}
  ansible.builtin.shell: grep "{{ opatch_file }}" {{ oracle_sources }}/checksum.txt | awk '{print $1}'
  register: opatch_expected_checksum
  changed_when: false
  when: oracle_version == '19c'
  tags: download_opatch

- name: Vérifier que le checksum a été trouvé pour {{ opatch_file }}
  ansible.builtin.fail:
    msg: "Checksum introuvable pour '{{ opatch_file }}' dans checksum.txt."
  when: oracle_version == '19c' and opatch_expected_checksum.stdout | length == 0
  tags: download_opatch

- name: Extraire le checksum attendu pour {{ psu_file }}
  ansible.builtin.shell: grep "{{ psu_file }}" {{ oracle_sources }}/checksum.txt | awk '{print $1}'
  register: psu_expected_checksum
  changed_when: false
  when: oracle_version == '19c'
  tags: download_ru

- name: Vérifier que le checksum a été trouvé pour {{ psu_file }}
  ansible.builtin.fail:
    msg: "Checksum introuvable pour '{{ psu_file }}' dans checksum.txt."
  when: oracle_version == '19c' and psu_expected_checksum.stdout | length == 0
  tags: download_ru

- name: Vérifier si {{ oracle_zip_filename }} existe déjà
  ansible.builtin.stat:
    path: "{{ oracle_sources }}/{{ oracle_zip_filename }}"
  register: file_check
  tags: download_sw

- name: Calculer le checksum actuel de {{ oracle_zip_filename }}
  ansible.builtin.shell: sha256sum {{ oracle_sources }}/{{ oracle_zip_filename }} | awk '{print $1}'
  register: current_checksum
  changed_when: false
  when: file_check.stat.exists
  tags: download_sw

- name: Téléchargement des binaires Oracle
  ansible.builtin.shell: wget --no-check-certificate --continue {{ oracle_binary_url }} -O {{ oracle_sources }}/{{ oracle_zip_filename }}
  when: not file_check.stat.exists or (current_checksum is defined and current_checksum.stdout != expected_checksum.stdout)
  tags: download_sw

- name: Extraction des binaires Oracle dans ORACLE_HOME
  ansible.builtin.unarchive:
    src: "{{ oracle_sources }}/{{ oracle_zip_filename }}"
    dest: "{{ oracle_home }}"
  become: true
  become_method: su
  become_user: oracle
  tags: extract_sw

- name: Copier stubs.tar pour Oracle 19c sur OL9/10
  ansible.builtin.copy:
    src: stubs.tar
    dest: "{{ oracle_home }}/lib/stubs/stubs.tar"
    owner: oracle
  when: oracle_version == '19c' and ansible_distribution_major_version in ["9", "10"]
  tags: extract_stubs

- name: Extraction de stubs.tar dans ORACLE_HOME/lib/stubs/
  ansible.builtin.unarchive:
    src: "{{ oracle_home }}/lib/stubs/stubs.tar"
    dest: "{{ oracle_home }}/lib/stubs/"
  become: true
  become_method: su
  become_user: oracle
  when: oracle_version == '19c' and ansible_distribution_major_version in ["9", "10"]
  tags: extract_stubs

- name: Vérifier si {{ opatch_file }} existe déjà
  ansible.builtin.stat:
    path: "{{ oracle_sources }}/{{ opatch_file }}"
  register: opatch_file_check
  when: oracle_version == '19c'
  tags: download_opatch

- name: Calculer le checksum actuel de {{ opatch_file }}
  ansible.builtin.shell: sha256sum {{ oracle_sources }}/{{ opatch_file }} | awk '{print $1}'
  register: opatch_current_checksum
  changed_when: false
  when: oracle_version == '19c' and opatch_file_check.stat.exists
  tags: download_opatch

- name: Téléchargement OPatch
  ansible.builtin.shell: wget --no-check-certificate --continue {{ opatch_download_url }} -O {{ oracle_sources }}/{{ opatch_file }}
  when: oracle_version == '19c' and (not opatch_file_check.stat.exists or (opatch_current_checksum is defined and opatch_current_checksum.stdout != opatch_expected_checksum.stdout))
  tags: download_opatch

- name: Vérifier si {{ psu_file }} existe déjà
  ansible.builtin.stat:
    path: "{{ oracle_sources }}/{{ psu_file }}"
  register: ru_file_check
  when: oracle_version == '19c'
  tags: download_ru

- name: Calculer le checksum actuel de {{ psu_file }}
  ansible.builtin.shell: sha256sum {{ oracle_sources }}/{{ psu_file }} | awk '{print $1}'
  register: psu_current_checksum
  changed_when: false
  when: oracle_version == '19c' and ru_file_check.stat.exists
  tags: download_ru

- name: Téléchargement du patch RU
  ansible.builtin.shell: wget --no-check-certificate --continue {{ psu_download_url }} -O {{ oracle_sources }}/{{ psu_file }}
  when: oracle_version == '19c' and (not ru_file_check.stat.exists or (psu_current_checksum is defined and psu_current_checksum.stdout != psu_expected_checksum.stdout))
  tags: download_ru

- name: Extraire le numéro de patch depuis le nom de fichier PSU
  ansible.builtin.set_fact:
    patch_number: "{{ psu_file | regex_search('p(\\d+)_', '\\1') | first }}"
  when: oracle_version == '19c'

- name: Installation OPatch dans ORACLE_HOME
  ansible.builtin.unarchive:
    src: "{{ oracle_sources }}/{{ opatch_file }}"
    dest: "{{ oracle_home }}"
  become: true
  become_method: su
  become_user: oracle
  when: oracle_version == '19c'
  tags: patch_db

- name: Extraction du patch RU dans {{ oracle_sources }}
  ansible.builtin.unarchive:
    src: "{{ oracle_sources }}/{{ psu_file }}"
    dest: "{{ oracle_sources }}"
  become: true
  become_method: su
  become_user: oracle
  when: oracle_version == '19c'
  tags: patch_db

- name: Copie du fichier de réponse pour installation silencieuse
  ansible.builtin.template:
    src: "db_install_{{ db_template_version_string }}.j2"
    dest: "{{ oracle_sources }}/{{ db_response_file }}"
  tags: responsefile

- name: Création du script d'installation silencieuse
  ansible.builtin.template:
    src: run_db_install.sh.j2
    dest: "{{ oracle_sources }}/run_db_install.sh"
    mode: "0755"
  tags: responsefile

- name: Installation des binaires Oracle
  ansible.builtin.shell: "{{ oracle_sources }}/run_db_install.sh"
  register: oradbinstall
  become: true
  become_method: su
  become_user: oracle
  ignore_errors: true
  tags: orainstall

- name: Affichage du résultat d'installation
  ansible.builtin.debug:
    var: oradbinstall.stdout_lines
  tags: orainstall

- name: Vérification de l'existence du script orainstRoot.sh
  ansible.builtin.stat:
    path: "{{ oracle_inventory }}/orainstRoot.sh"
  register: orainstRoot

- name: Exécution du script orainstRoot.sh
  ansible.builtin.shell: "{{ oracle_inventory }}/orainstRoot.sh"
  when: orainstRoot.stat.exists
  tags: runroot

- name: Exécution du script root.sh
  ansible.builtin.shell: "{{ oracle_home }}/root.sh"
  tags: runroot

- name: Vérification des patches installés
  ansible.builtin.shell: "{{ oracle_home }}/OPatch/opatch lspatches"
  become: true
  become_method: su
  become_user: oracle
  register: opatchls
  changed_when: false
  tags: opatch

- name: Affichage des patches installés
  ansible.builtin.debug:
    var: opatchls.stdout_lines
  tags: opatch

- name: Détection des conflits de patch RU
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    cd {{ oracle_sources }}/{{ patch_number }}
    $ORACLE_HOME/OPatch/opatch prereq CheckConflictAgainstOHWithDetail -ph ./
  register: conflict_detection
  failed_when: "'Prereq \"checkConflictAgainstOHWithDetail\" passed.' not in conflict_detection.stdout"
  become: true
  become_method: su
  become_user: oracle
  when: oracle_version == '19c'
  tags: patch_db

- name: Application du patch RU
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    cd {{ oracle_sources }}/{{ patch_number }}
    $ORACLE_HOME/OPatch/opatch apply -silent
  register: apply_psu
  failed_when: "'OPatch succeeded.' not in apply_psu.stdout"
  become: true
  become_method: su
  become_user: oracle
  when: oracle_version == '19c'
  tags: patch_db

- name: Vérification des patches installés après RU
  ansible.builtin.shell: "{{ oracle_home }}/OPatch/opatch lspatches"
  become: true
  become_method: su
  become_user: oracle
  register: opatchls
  changed_when: false
  when: oracle_version == '19c'
  tags: patch_db

- name: Affichage des patches installés après RU
  ansible.builtin.debug:
    var: opatchls.stdout_lines
  when: oracle_version == '19c'
  tags: patch_db

- name: Suppression des fichiers temporaires d'installation
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ oracle_sources }}/{{ db_response_file }}"
    - "{{ oracle_sources }}/run_db_install.sh"
    - "{{ oracle_sources }}/{{ oracle_zip_filename }}"

- name: Suppression des fichiers de patch
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ oracle_sources }}/{{ patch_number }}"
    - "{{ oracle_sources }}/{{ opatch_file }}"
    - "{{ oracle_sources }}/{{ psu_file }}"
  when: oracle_version == '19c'
  tags: patch_db
