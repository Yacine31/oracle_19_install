---
- name: Installation des packages nécessaires
  ansible.builtin.package:
    name: "{{ linux_packages }}"
    state: latest
  tags: [packages, rpm_packages]

- name: Démarrage et activation de chronyd
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true
  ignore_errors: true
  tags: services

- name: Démarrage et activation de nscd
  ansible.builtin.service:
    name: nscd
    state: started
    enabled: true
  ignore_errors: true

- name: Démarrage et activation de rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: started
    enabled: true
  ignore_errors: true

- name: Désactivation de SELinux (permanent)
  ansible.builtin.selinux:
    state: disabled
  register: selinux
  tags: selinux

- name: Désactivation de SELinux (runtime)
  ansible.builtin.command: setenforce 0
  failed_when: false
  changed_when: false
  tags: selinux

- name: Arrêt et désactivation des services inutiles
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ linux_services }}"
  ignore_errors: true
  tags: linuxservices

- name: Ajustement des paramètres kernel Oracle
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    ignoreerrors: true
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/99-oracle-database-preinstall-19c-sysctl.conf
  loop: "{{ oracle_sysconfig }}"
  tags: sysctl.conf

- name: Configuration PAM
  ansible.builtin.lineinfile:
    dest: /etc/pam.d/login
    state: present
    line: "session required pam_limits.so"
  tags: pamconfig

- name: Ajustement des limits Oracle
  ansible.builtin.lineinfile:
    dest: /etc/security/limits.d/oracle-database-preinstall-19c.conf
    create: true
    state: present
    line: "{{ item }}"
  loop: "{{ oracle_seclimits }}"
  tags: seclimit

- name: Ajout du profil Oracle dans /etc/profile.d
  ansible.builtin.copy:
    src: z_oracle.sh
    dest: /etc/profile.d/z_oracle.sh
    owner: root
    mode: "0644"
  tags: z_oracle

- name: Ajout des alias bash dans /etc/profile.d
  ansible.builtin.copy:
    src: z_bash_aliases.sh
    dest: /etc/profile.d/z_bash_aliases.sh
    owner: root
    mode: "0644"
  tags: bash_alias

- name: Activation de l'autocomplétion sans tenir compte de la casse
  ansible.builtin.lineinfile:
    dest: /etc/inputrc
    line: "set completion-ignore-case On"
    create: true
    state: present
  tags: bash_tab

- name: Désactivation de la commande crontab -r
  ansible.builtin.lineinfile:
    dest: /etc/profile.d/z_crontab_r.sh
    line: 'crontab () { [[ $@ =~ -[iel]*r ]] && echo "option -r (remove) not allowed" || command crontab "$@" ;}'
    state: present
    create: true
  tags: bash_cron_r

- name: Limitation de la taille des logs journald à 500M
  ansible.builtin.lineinfile:
    dest: /etc/systemd/journald.conf
    line: "SystemMaxUse=500M"
  tags: journalctl

- name: Configuration du mode panic sur perte du /
  ansible.builtin.command: "tune2fs -e panic {{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first }}"
  changed_when: false
  tags: mode_panic

- name: Configuration du mode panic sur bug kernel
  ansible.builtin.sysctl:
    name: kernel.panic_on_oops
    value: "1"
    state: present
    reload: true
    ignoreerrors: true
    sysctl_file: /etc/sysctl.d/99-oracle-database-preinstall-19c-sysctl.conf
  tags: mode_panic

- name: Configuration du démarrage en mode multi-user (runlevel 3)
  ansible.builtin.command: systemctl set-default multi-user.target
  changed_when: false
  tags: init3

- name: Fix libnsl.so.1 pour Oracle sur OL10
  ansible.builtin.shell: |
    rm -f /usr/lib64/libnsl.so.1
    ln -s /usr/lib64/libnsl.so.3.0.0 /usr/lib64/libnsl.so.1
  when: ansible_distribution_major_version == "10"
  tags: ol10_fix
